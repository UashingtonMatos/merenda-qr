<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
  
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  
<style>
body { font-family: Arial; margin:0; text-align:center; }

.tela { display:none; padding:20px; }

input { padding:10px; width:80%; margin:10px; font-size:16px; }
button { padding:10px 20px; font-size:16px; }

.topo { display:flex; justify-content:space-between; padding:10px; background:#f5f5f5; }

#reader { width:300px; margin:20px auto; }
#msg { font-size:20px; margin-top:15px; font-weight:bold; }
</style>
</head>



<body>

<!-- LOGIN -->
<div id="login" class="tela">
  <h2>🍽️ Controle de Merenda</h2>

  <input type="text" id="email" placeholder="Email"><br>
  <input type="password" id="senha" placeholder="Senha"><br>

  <button onclick="entrar()">Entrar</button>

  <p id="msgLogin" style="color:red;"></p>
</div>

<!-- SCANNER -->
<div id="scanner" class="tela">

  <div class="topo">
    <b id="escola"></b>
    <button onclick="sair()">Sair</button>
  </div>

  <h3>📷 Leitor de QR</h3>

  <div id="reader"></div>

  <p id="msg"></p>

</div>


<script>
  
console.log("Html5Qrcode:", typeof Html5Qrcode);

const API_URL = "https://script.google.com/macros/s/AKfycbzr5i6rAiVL6ygmmsthqw8n-MY849FTplc0WV3ypmGKUZb1Mli_uo84fy-20txm4ankWA/exec";

let html5QrCode;

// inicialização
window.onload = function() {

  if (localStorage.getItem("escola")) {
    mostrarScanner();
  } else {
    mostrarLogin();
  }

};

// telas
function mostrarLogin() {
  document.getElementById("login").style.display = "block";
  document.getElementById("scanner").style.display = "none";
}

function mostrarScanner() {
  document.getElementById("login").style.display = "none";
  document.getElementById("scanner").style.display = "block";

  document.getElementById("escola").innerText = localStorage.getItem("escola");

  iniciarCamera();
}

// login via Apps Script
function entrar() {

  var email = document.getElementById("email").value;
  var senha = document.getElementById("senha").value;

  fetch(API_URL + "?email=" + email + "&senha=" + senha)
    .then(res => res.json())
    .then(data => {

      if (data.status === "ok") {

        localStorage.setItem("escola", data.escola);
        mostrarScanner();

      } else {
        document.getElementById("msgLogin").innerText = "Login inválido";
      }

    })
    .catch(() => {
      document.getElementById("msgLogin").innerText = "Erro ao conectar";
    });

}

// sair
function sair() {
  localStorage.clear();

  if (html5QrCode) {
    html5QrCode.stop();
  }

  mostrarLogin();
}

// mensagem
function mostrarMensagem(res) {
  let msg = document.getElementById("msg");

  msg.innerText = res.msg;

  if (res.status === "ok") {
    msg.style.color = "green";
  } else if (res.status === "duplicado") {
    msg.style.color = "orange";
  } else {
    msg.style.color = "red";
  }
}


if (typeof Html5Qrcode === "undefined") {
document.getElementById("msg").innerText = "Biblioteca não carregou";
return;
}

// iniciar scanner
function iniciarCamera() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      html5QrCode.start(
        devices[0].id,
        { fps: 10, qrbox: 250 },
        (decodedText) => {

          html5QrCode.stop();

          fetch(API_URL + "?matricula=" + decodedText)
            .then(res => res.json())
            .then(data => {

              mostrarMensagem(data);

              setTimeout(() => {
                iniciarCamera();
              }, 1500);

            });

        }
      );

    }

  }).catch(() => {
    document.getElementById("msg").innerText = "Erro ao acessar câmera";
  });

}

</script>

</body>
</html>
